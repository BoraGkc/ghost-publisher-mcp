name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  ghost:
    strategy:
      fail-fast: false
      matrix:
        image: ['ghost:5-alpine', 'ghost:6-alpine']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Start Ghost
        env:
          GHOST_IMAGE: ${{ matrix.image }}
        run: docker compose -f test/docker-compose.yml up -d
      - name: Run publishing workflow
        env:
          GHOST_IMAGE: ${{ matrix.image }}
        run: npm run test:integration
      - if: always()
        env:
          GHOST_IMAGE: ${{ matrix.image }}
        run: docker compose -f test/docker-compose.yml logs ghost && docker compose -f test/docker-compose.yml down -v

  package:
    needs: ghost
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm audit --audit-level=high
      - run: npm pack --dry-run
      - name: Verify release metadata
        run: |
          node -e "const p=require('./package.json'),s=require('./server.json'); if(p.mcpName!==s.name||p.version!==s.version||p.name!==s.packages[0].identifier||p.version!==s.packages[0].version) throw new Error('package.json and server.json must match')"
          test "$GITHUB_REF_NAME" = "v$(node -p "require('./package.json').version")"
      - run: npm pack
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: npm-package
          path: ghost-publisher-mcp-*.tgz
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: npm-package
      - run: npm install --global npm@11.5.1 --ignore-scripts
      - name: Verify packaged release
        run: |
          package_file="$(find . -maxdepth 1 -name 'ghost-publisher-mcp-*.tgz' -print -quit)"
          test -n "$package_file"
          test "$GITHUB_REF_NAME" = "v$(node -p "require('./package.json').version")"
          tar --extract --to-stdout --gzip --file "$package_file" package/package.json | \
            node -e "const p=JSON.parse(require('fs').readFileSync(0,'utf8'));if(p.version!==require('./package.json').version)process.exit(1)"
      - name: Publish npm package with provenance
        run: npm publish ./ghost-publisher-mcp-*.tgz --provenance --access public
      - name: Wait for npm availability
        run: |
          release_version="$(node -p "require('./package.json').version")"
          for attempt in $(seq 1 30); do
            if published_version="$(npm view "ghost-publisher-mcp@${release_version}" version 2>/dev/null)" && test "$published_version" = "$release_version"; then
              exit 0
            fi
            sleep 10
          done
          echo "npm did not expose ghost-publisher-mcp@${release_version} within five minutes" >&2
          exit 1
      - name: Install pinned MCP publisher
        run: |
          curl --fail --location --silent --show-error \
            --output mcp-publisher_linux_amd64.tar.gz \
            https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz
          echo "ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac  mcp-publisher_linux_amd64.tar.gz" | sha256sum --check
          tar --extract --gzip --file mcp-publisher_linux_amd64.tar.gz mcp-publisher
          ./mcp-publisher --version 2>&1 | grep --extended-regexp --quiet '(^|[^0-9])v?1\.7\.9([^0-9]|$)'
      - name: Authenticate to official MCP Registry
        run: ./mcp-publisher login github-oidc
      - name: Publish official MCP Registry metadata
        run: ./mcp-publisher publish
      - name: Verify npm and official MCP Registry versions
        run: |
          release_version="$(node -p "require('./package.json').version")"
          test "$(npm view "ghost-publisher-mcp@${release_version}" version)" = "$release_version"
          registry_url="https://registry.modelcontextprotocol.io/v0.1/servers/io.github.BoraGkc%2Fghost-publisher/versions/${release_version}"
          for attempt in $(seq 1 30); do
            if registry_json="$(curl --fail --silent --show-error "$registry_url" 2>/dev/null)" && \
              printf '%s' "$registry_json" | node -e "const d=JSON.parse(require('fs').readFileSync(0,'utf8'));if(d.server?.version!==process.argv[1])process.exit(1)" "$release_version"; then
              exit 0
            fi
            sleep 10
          done
          echo "Official MCP Registry did not expose ${release_version} within five minutes" >&2
          exit 1
