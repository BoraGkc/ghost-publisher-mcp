name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  ghost:
    strategy:
      matrix:
        image: ['ghost:5-alpine', 'ghost:6-alpine']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Start Ghost
        env:
          GHOST_IMAGE: ${{ matrix.image }}
        run: docker compose -f test/docker-compose.yml up -d
      - name: Run publishing workflow
        env:
          GHOST_IMAGE: ${{ matrix.image }}
        run: npm run test:integration
      - if: always()
        env:
          GHOST_IMAGE: ${{ matrix.image }}
        run: docker compose -f test/docker-compose.yml logs ghost && docker compose -f test/docker-compose.yml down -v

  npm:
    needs: ghost
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm install --global npm@11.5.1
      - run: npm run check
      - run: npm audit --audit-level=high
      - run: npm pack --dry-run
      - name: Verify release metadata
        run: |
          node -e "const p=require('./package.json'),s=require('./server.json'); if(p.mcpName!==s.name||p.version!==s.version||p.name!==s.packages[0].identifier||p.version!==s.packages[0].version) throw new Error('package.json and server.json must match')"
          test "$GITHUB_REF_NAME" = "v$(node -p "require('./package.json').version")"
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
